name: zizmor

on:
  workflow_call:
    inputs:
      path:
        required: false
        type: string
        default: .
      version:
        required: false
        type: string
        default: latest
      collect:
        required: false
        type: string
      min-severity:
        required: false
        type: string
      min-confidence:
        required: false
        type: string
      persona:
        required: false
        type: string
      offline:
        required: false
        type: boolean
        default: false
      no-online-audits:
        required: false
        type: boolean
        default: false
      strict-collection:
        required: false
        type: boolean
        default: false
      github-app-client-id:
        required: false
        type: string
      github-app-owner:
        required: false
        type: string
      github-app-repositories:
        required: false
        type: string
    secrets:
      github-app-private-key:
        required: false

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      -
        name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      -
        name: Resolve GitHub App authentication
        id: github-app-auth
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_GITHUB-APP-CLIENT-ID: ${{ inputs.github-app-client-id }}
          INPUT_GITHUB-APP-PRIVATE-KEY: ${{ secrets.github-app-private-key }}
        with:
          script: |
            const hasClientId = core.getInput('github-app-client-id') !== '';
            const hasPrivateKey = core.getInput('github-app-private-key') !== '';
            if (hasClientId !== hasPrivateKey) {
              core.setFailed('input `github-app-client-id` and secret `github-app-private-key` must be provided together');
              return;
            }
            core.setOutput('enabled', hasClientId ? 'true' : 'false');
      -
        name: Create GitHub App token
        id: app-token
        if: ${{ steps.github-app-auth.outputs.enabled == 'true' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ inputs.github-app-client-id }}
          private-key: ${{ secrets.github-app-private-key }}
          owner: ${{ inputs.github-app-owner }}
          repositories: ${{ inputs.github-app-repositories }}
          permission-contents: read
      -
        name: Install zizmor
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_VERSION: ${{ inputs.version }}
        with:
          script: |
            const inpVersion = core.getInput('version');
            const toolSpec = inpVersion === 'latest' ? 'zizmor' : `zizmor@${inpVersion}`;
            await exec.exec('uv', [
              'tool',
              'install',
              '--no-build',
              '--no-cache',
              '--no-config',
              '--no-managed-python',
              '--no-progress',
              '--no-python-downloads',
              toolSpec
            ]);
      -
        name: Run zizmor
        id: zizmor
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_PATH: ${{ inputs.path }}
          INPUT_COLLECT: ${{ inputs.collect }}
          INPUT_MIN-SEVERITY: ${{ inputs.min-severity }}
          INPUT_MIN-CONFIDENCE: ${{ inputs.min-confidence }}
          INPUT_PERSONA: ${{ inputs.persona }}
          INPUT_OFFLINE: ${{ inputs.offline }}
          INPUT_NO-ONLINE-AUDITS: ${{ inputs.no-online-audits }}
          INPUT_STRICT-COLLECTION: ${{ inputs.strict-collection }}
          ZIZMOR_GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        with:
          script: |
            const fs = require('fs');
            const os = require('os');
            const path = require('path');

            const inpPath = core.getInput('path');
            const inpCollect = core.getMultilineInput('collect');
            const inpMinSeverity = core.getInput('min-severity');
            const inpMinConfidence = core.getInput('min-confidence');
            const inpPersona = core.getInput('persona');
            const inpOffline = core.getBooleanInput('offline');
            const inpNoOnlineAudits = core.getBooleanInput('no-online-audits');
            const inpStrictCollection = core.getBooleanInput('strict-collection');

            const args = ['--format=sarif', '--color=always'];
            for (const item of inpCollect) {
              args.push(`--collect=${item}`);
            }
            if (inpMinSeverity) {
              args.push(`--min-severity=${inpMinSeverity}`);
            }
            if (inpMinConfidence) {
              args.push(`--min-confidence=${inpMinConfidence}`);
            }
            if (inpPersona) {
              args.push(`--persona=${inpPersona}`);
            }
            if (inpOffline) {
              args.push('--offline');
            }
            if (inpNoOnlineAudits) {
              args.push('--no-online-audits');
            }
            if (inpStrictCollection) {
              args.push('--strict-collection');
            }
            args.push(inpPath);

            const exitCodeMessage = {
              1: 'error during audit, consult zizmor output',
              2: 'argument parsing failure, consult zizmor output',
              3: 'no inputs were collected',
              11: 'findings detected, highest severity is informational',
              12: 'findings detected, highest severity is low',
              13: 'findings detected, highest severity is medium',
              14: 'findings detected, highest severity is high'
            };

            const res = await exec.getExecOutput('zizmor', args, {
              ignoreReturnCode: true
            });
            if (res.exitCode > 0 && res.exitCode < 11) {
              const details = exitCodeMessage[res.exitCode] || 'unexpected exit code, consult zizmor output';
              core.setFailed(`zizmor exited with code ${res.exitCode}: ${details}`);
              return;
            }

            const sarifPath = path.join(fs.mkdtempSync(path.join(process.env.RUNNER_TEMP || os.tmpdir(), 'zizmor-')), 'results.sarif');
            await fs.writeFileSync(sarifPath, res.stdout.trim());
            core.setOutput('sarif-path', sarifPath);
      -
        name: Upload SARIF report
        if: ${{ always() && steps.zizmor.outputs.sarif-path != '' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ steps.zizmor.outputs.sarif-path }}
          category: zizmor
