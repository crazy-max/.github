name: .test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#permissions
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  releases-json:
    uses: ./.github/workflows/releases-json.yml
    with:
      repository: docker/buildx
      artifact_name: buildx-releases-json
      filename: buildx-releases.json

  releases-json-check:
    runs-on: ubuntu-latest
    needs:
      - releases-json
    steps:
      -
        name: Download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: buildx-releases-json
          path: .
      -
        name: Check file
        run: |
          jq . buildx-releases.json

  releases-json-edge:
    uses: ./.github/workflows/releases-json.yml
    with:
      repository: crazy-max/releases-json-test
      artifact_name: test-edge-releases-json
      filename: test-edge-releases.json

  releases-json-edge-check:
    runs-on: ubuntu-latest
    needs:
      - releases-json-edge
    steps:
      -
        name: Download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-edge-releases-json
          path: .
      -
        name: Check file
        run: |
          jq . test-edge-releases.json

  releases-json-pin:
    uses: ./.github/workflows/releases-json.yml
    with:
      repository: docker/buildx
      artifact_name: buildx-releases-pin-json
      filename: buildx-releases-pin.json
      pin_latest: v0.18.0

  releases-json-pin-check:
    runs-on: ubuntu-latest
    needs:
      - releases-json-pin
    steps:
      -
        name: Download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: buildx-releases-pin-json
          path: .
      -
        name: Check file
        run: |
          jq . buildx-releases-pin.json

  releases-json-pattern:
    uses: ./.github/workflows/releases-json.yml
    with:
      repository: moby/moby
      artifact_name: moby-releases-json
      filename: moby-releases.json
      tag_patterns: |
        ^docker-(.*)$
        ^(v.*)$

  releases-json-pattern-check:
    runs-on: ubuntu-latest
    needs:
      - releases-json-pattern
    steps:
      -
        name: Download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: moby-releases-json
          path: .
      -
        name: Check file
        run: |
          jq . moby-releases.json

  releases-json-non-semver:
    uses: ./.github/workflows/releases-json.yml
    with:
      repository: upx/upx
      artifact_name: upx-releases-json
      filename: upx-releases.json

  releases-json-non-semver-check:
    runs-on: ubuntu-latest
    needs:
      - releases-json-non-semver
    steps:
      -
        name: Download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: upx-releases-json
          path: .
      -
        name: Check file
        run: |
          jq . upx-releases.json

  install-k3s:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      -
        name: Install k3s
        uses: ./.github/actions/install-k3s
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver: kubernetes
          driver-opts: qemu.install=true
          buildkitd-flags: --debug

  list-commits:
    uses: ./.github/workflows/list-commits.yml
    with:
      limit: 5

  list-commits-check:
    runs-on: ubuntu-latest
    needs:
      - list-commits
    strategy:
      fail-fast: false
      matrix:
        commit: ${{ fromJson(needs.list-commits.outputs.matrix) }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ matrix.commit }}

  container-logs-check:
    runs-on: ubuntu-latest
    services:
      cloudflared:
        image: crazymax/cloudflared:latest@sha256:9b4e856d18f6f6367330c56d91452f5fe3b6bd235f1210dcd9f6bd7373cad9be
        options: >-
          --label "diun.enable=true"
          --label "diun.watch_repo=true"
    steps:
      -
        name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      -
        name: Create Diun config
        run: |
          cat > diun.yml <<'EOF'
          watch:
            workers: 20
            schedule: "0 */6 * * *"
            jitter: 5m

          providers:
            docker:
              watchByDefault: true
          EOF
      -
        name: Run Diun
        run: |
          docker run -d --name diun \
            --health-cmd "diun healthcheck" \
            --health-interval 30s \
            --health-timeout 5s \
            --health-retries 3 \
            --health-start-period 60s \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd)/diun.yml:/diun.yml:ro" \
            -e "TZ=Europe/Paris" \
            -e "LOG_LEVEL=info" \
            crazymax/diun:latest
      -
        name: Check container logs
        uses: ./.github/actions/container-logs-check
        with:
          name: diun
          log_check: "Next run in"
          timeout: 240

  container-logs-check-notfound:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      -
        name: Run container
        run: |
          docker run -d --name test crazymax/samba:latest
      -
        name: Check container logs
        id: check
        continue-on-error: true
        uses: ./.github/actions/container-logs-check
        with:
          name: test
          log_check: " foo."
          timeout: 10
      -
        name: Check
        run: |
          if [ "${{ steps.check.outcome }}" != "failure" ] || [ "${{ steps.check.conclusion }}" != "success" ]; then
            echo "::error::Should have failed"
            exit 1
          fi

  container-logs-check-failed:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      -
        name: Run container
        run: |
          docker run -d --name test --entrypoint '' crazymax/samba:latest sh -c "echo 'foo' && exit 1"
      -
        name: Check container logs
        id: check
        continue-on-error: true
        uses: ./.github/actions/container-logs-check
        with:
          name: test
          log_check: " foo."
          timeout: 10
      -
        name: Check
        run: |
          if [ "${{ steps.check.outcome }}" != "failure" ] || [ "${{ steps.check.conclusion }}" != "success" ]; then
            echo "::error::Should have failed"
            exit 1
          fi

  container-logs-check-service:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      -
        name: Init swarm
        run: |
          docker swarm init --advertise-addr "$(hostname -I | awk '{print $1}')"
      -
        name: Run service
        run: |
          docker service create --name test busybox sh -c '
            i=1
            while [ "$i" -le 100 ]; do
              echo "service log $i"
              i=$((i + 1))
            done
            echo "service ready"
            sleep 600
          '
      -
        name: Check service logs
        uses: ./.github/actions/container-logs-check
        with:
          name: test
          type: service
          log_check: "service ready"
          timeout: 30
      -
        name: Leave swarm
        if: ${{ always() }}
        run: |
          docker swarm leave --force

  docker-scout:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}
    permissions:
      contents: read # required to check out the repository
      security-events: write # required to write sarif report
    strategy:
      fail-fast: false
      matrix:
        format:
          - packages
          - sarif
          - spdx
    steps:
      -
        name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      -
        name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Scout
        id: scout
        uses: ./.github/actions/docker-scout
        with:
          image: registry://moby/buildkit:master
          format: ${{ matrix.format }}
      -
        name: Check result file
        if: ${{ matrix.format != 'packages' }}
        run: |
          set -x
          cat ${{ steps.scout.outputs.result-file }}
