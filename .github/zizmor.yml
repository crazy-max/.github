# https://docs.zizmor.sh/configuration/
rules:
  # rule does not apply to reusable worfklows where permissions are defined by the caller workflow
  excessive-permissions:
    ignore:
      - list-commits.yml
      - pr-assign-author.yml
      - releases-json.yml
      - zizmor.yml

  # FIXME: remove this rule when zizmor 1.24.0 is released, fixing the right persona attached to this rule: https://github.com/zizmorcore/zizmor/pull/1783
  secrets-outside-env:
    disable: true
